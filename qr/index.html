<!DOCTYPE html>
<html lang="bn">
<head>

<title>ScanKoro – Digital Shop Sticker Studio</title>

<!-- Firebase Server Injection Tags -->
<!-- In website mode, these stay as literal strings. In Firebase, Node.js injects the data. -->
<meta name="server-mode" content="${typeof sellerId !== 'undefined' ? 'true' : 'false'}">
<meta name="server-shop" content="${typeof displayName !== 'undefined' ? displayName : ''}">
<meta name="server-qr" content="${typeof qrApiUrl !== 'undefined' ? qrApiUrl : ''}">

<style>
  :root { --theme:#FFEB3B; }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body { font-family:'Inter', system-ui, -apple-system, sans-serif; }
  .font-bn { font-family:'Hind Siliguri', system-ui, sans-serif; }
  
  .wrap { 
    filter: drop-shadow(0 25px 50px rgba(0,0,0,.5));
    perspective: 1200px;
    transition: transform .4s ease;
  }
  .sticker {
    width:480px;
    height:640px;
    background: var(--theme);
    border-radius:36px;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform-style: preserve-3d;
    transition: background .3s ease, transform .3s ease;
  }
  
  .brand {
    font-weight:700;
    font-size:52px;
    letter-spacing:-0.5px;
    color:#000;
    margin-top:28px;
    z-index:3;
    position:relative;
    text-align:center;
    width:100%;
  }
  .tagline {
    font-size: 24px;
    font-weight: 600;
    color: rgba(0,0,0,.8);
    margin-top: 2px;
    z-index: 3;
    position: relative;
    letter-spacing: .2px;
  }
 .magnifier {
    position:relative;
    width:320px;
    height:320px;
    margin-top:14px;
    z-index:5;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotateZ(0); }
    50% { transform: translateY(-6px) rotateZ(-0.5deg); }
  }
 .lens {
    position:absolute;
    width:260px;
    height:260px;
    left:30px;
    top:0;
    border:22px solid #000;
    border-radius:50%;
    background: var(--theme);
    transition: background.3s ease;
    display:grid;
    place-items:center;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,.06), 0 8px 20px rgba(0,0,0,.08);
    overflow:hidden;
  }
 .sticker-gloss {
    position:absolute;
    inset:0;
    background: radial-gradient(420px 240px at 50% -40px, rgba(255,255,255,.45) 0%, rgba(255,255,255,.15) 30%, rgba(255,255,255,0) 60%);
    pointer-events:none;
    z-index:1;
  }
  .sticker-overlay {
    position:absolute;
    inset:0;
    background: linear-gradient(180deg, rgba(255,255,255,.15), transparent 30%, transparent 70%, rgba(0,0,0,.04));
    mix-blend-mode: multiply;
    pointer-events:none;
    z-index:1;
  }
  .lens-shine {
    position:absolute;
    width:140%;
    height:60px;
    top:18%;
    left:-20%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.85), transparent);
    transform: rotate(-18deg);
    filter: blur(2px);
    opacity:.6;
    animation: shine 5s ease-in-out infinite;
    z-index:3;
    pointer-events:none;
  }
  @keyframes shine {
    0%,70%,100% { transform: translateX(-120%) rotate(-18deg); opacity:0; }
    15% { opacity:.7; }
    30% { transform: translateX(120%) rotate(-18deg); opacity:0; }
  }
 .lens img {
    width:150px;
    height:150px;
    display:block;
    position:relative;
    z-index:2;
    border-radius:8px;
  }
  /* --- MODIFIED: Reduced handle size slightly --- */
 .handle {
    position:absolute;
    width:150px;
    height:38px;
    background:#000;
    border-radius:19px;
    left:226px;
    top:222px;
    transform:rotate(45deg);
    transform-origin:left center;
    box-shadow: 0 4px 10px rgba(0,0,0,.25);
  } 
  .bottom {
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:118px;
    background:#fff;
    display:flex;
    align-items:center;

    padding:0 28px;
    z-index:4;
    box-shadow: 0 -10px 30px rgba(0,0,0,.08);

    color:#000;
    line-height:1.4;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

  .shop .name:focus { background: rgba(0,0,0,.04); padding:0 4px; margin-left:-4px; border-radius:6px; }
  .verified-badge { width: 26px; height: 26px; flex-shrink: 0; }

  /* --- MODIFIED: New premium pill design --- */
  
  .pill:active { 
    transform: scale(.97) translateY(1px);
    box-shadow: inset 0 1px 2px rgba(0,0,0,.15), 0 1px 2px rgba(0,0,0,.05);
  }
  .pill svg {
    width: 16px;
    height: 16px;
    color: #555;
    margin-bottom: 2px;
  }
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
  }

  @media (max-width: 640px) {
    .sticker { transform: scale(.78); transform-origin: top center; }
    .wrap { height: 500px; }
  }

  @media print {
    @page { size: 480px 640px; margin: 0; }
    html, body { background: #fff !important; padding: 0 !important; margin: 0 !important; width: 480px !important; height: 640px !important; overflow: hidden !important; }
    .no-print, .bg-decor, .absolute.-inset-6 { display: none !important; }
    body > div.relative, main, section { padding: 0 !important; margin: 0 !important; display: block !important; }
    .wrap { filter: none !important; perspective: none !important; transform: none !important; height: 640px !important; margin: 0 !important; }
    .sticker { position: fixed !important; top: 0 !important; left: 0 !important; transform: none !important; box-shadow: none !important; margin: 0 !important; border-radius: 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .magnifier, .lens-shine { animation: none !important; }
    .lens-shine { display: none !important; }
  }
 .pill {
  background: linear-gradient(135deg, var(--theme) 0%, var(--theme) 100%);
  color: var(--pill-text-color, #000);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 0.3px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 12px 22px 13px;
  border-radius: 999px;
  border: 2px solid rgba(0,0,0,.15);
  box-shadow: 
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -1px 0 rgba(0,0,0,.12), /* <-- FIX: Changed the 2px blur to 0 for a crisp edge */
    0 0 0 1px rgba(255,255,255,.1),
    0 4px 14px rgba(0,0,0,.2),
    0 2px 4px rgba(0,0,0,.15);
  position: relative;
  overflow: hidden;
  transition: all .2s cubic-bezier(.4,0,.2,1);
}

.pill::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, 
    rgba(255,255,255,.3) 0%, 
    rgba(255,255,255,.08) 45%, 
    transparent 50%, 
    rgba(0,0,0,.05) 100%
  );
  border-radius: inherit;
  pointer-events: none;
}

.pill::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -10%;
  right: -10%;
  height: 60%;
  background: linear-gradient(180deg, rgba(255,255,255,.35), transparent);
  filter: blur(6px);
  pointer-events: none;
  border-radius: 50%;
}

.pill svg {
  width: 18px;
  height: 18px;
  color: inherit;
  opacity: .85;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,.15));
  flex-shrink: 0;
}

.pill span {
  position: relative;
  text-shadow: 0 1px 2px rgba(0,0,0,.08);
}
</style>

<script>
  const $ = (s) => document.querySelector(s);
  const shopNameInput = $('#shopName');
  const shopSlugInput = $('#shopSlug');
  const customUrlInput = $('#customUrl');
  const pillTextInput = $('#pillText');
  const shopNamePreview = $('#shopNamePreview');
  const pillTextPreview = $('#pillTextPreview'); // Target the span inside the pill
  const qrImg = $('#qr');
  const sticker = $('#sticker');
  const downloadBtn = $('#downloadBtn');
  const copyBtn = $('#copyBtn');
  const themeSwatches = $('#themeSwatches');
  const toast = $('#toast');
  const toastMsg = $('#toastMsg');
  const tiltWrap = $('#tiltWrap');

  let currentTheme = '#FFEB3B';

  function slugify(str) {
    return str.toLowerCase().trim()
      .replace(/[^a-z0-9\u0980-\u09FF]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'shop';
  }

  function getShopUrl() {
    const custom = customUrlInput.value.trim();
    if (custom) return custom;
    const slug = slugify(shopSlugInput.value || shopNameInput.value);
    return 'https://scankoro.com/s/' + slug;
  }

  function updateQR() {
    const url = getShopUrl();
    const bgColor = currentTheme.replace('#', '');
    const qrApi = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(url) + '&format=png&margin=2&color=000000&bgcolor=' + bgColor;
    if (qrImg.src !== qrApi) {
      qrImg.src = qrApi;
    }
  }

  function updatePreview() {
    shopNamePreview.textContent = shopNameInput.value || 'দোকানের নাম';
    // MODIFIED: Update the text of the span inside the pill
    pillTextPreview.textContent = pillTextInput.value || 'Digital Shop';
    updateQR();
    if (!shopSlugInput.dataset.touched) {
      shopSlugInput.value = slugify(shopNameInput.value);
    }
  }

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? {
    r: parseInt(result[1], 16),
    g: parseInt(result[2], 16),
    b: parseInt(result[3], 16)
  } : { r: 255, g: 235, b: 59 };
}

function setTheme(color) {
  currentTheme = color;
  document.documentElement.style.setProperty('--theme', color);
  
  // Smart text color based on background brightness
  const rgb = hexToRgb(color);
  const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
  const textColor = brightness > 160 ? '#000000' : '#FFFFFF';
  const iconColor = brightness > 160 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.9)';
  
  document.documentElement.style.setProperty('--pill-text-color', textColor);
  
  // Update pill icon color
  const pillIcon = document.querySelector('.pill svg');
  if (pillIcon) pillIcon.style.color = iconColor;
  
  [...themeSwatches.children].forEach(btn => {
    const isActive = btn.dataset.color === color;
    btn.classList.toggle('ring-2', isActive);
    btn.classList.toggle('ring-white/80', isActive);
    btn.classList.toggle('ring-offset-2', isActive);
    btn.classList.toggle('ring-offset-slate-950', isActive);
  });
  document.querySelector('.bg-decor > div:nth-child(2)').style.backgroundColor = color + '33';
  updateQR();
}

  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.style.opacity = '1';
    toast.style.transform = 'translate(-50%, 0)';
    toast.style.pointerEvents = 'auto';
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translate(-50%, 10px)';
    }, 2000);
  }

  async function downloadPNG() {
    downloadBtn.disabled = true;
    downloadBtn.querySelector('span').innerHTML = '<svg class="animate-spin" width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity=".2" stroke-width="4" fill="none"/><path d="M12 2 a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/></svg> তৈরি হচ্ছে...';
    
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 150));

    const magnifier = sticker.querySelector('.magnifier');
    const prevAnim = magnifier.style.animation;
    magnifier.style.animation = 'none';
    
    const canvas = await html2canvas(sticker, {
      backgroundColor: null,
      scale: 3,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });
    
    magnifier.style.animation = prevAnim;
    
    const link = document.createElement('a');
    const slug = slugify(shopSlugInput.value || 'shop');
    link.download = 'scankoro-' + slug + '-sticker.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    
    downloadBtn.disabled = false;
    downloadBtn.querySelector('span').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PNG ডাউনলোড';
    showToast('PNG ডাউনলোড হয়েছে!');
  }

  // Events
  shopNameInput.addEventListener('input', updatePreview);
  shopSlugInput.addEventListener('input', () => { shopSlugInput.dataset.touched = '1'; updatePreview(); });
  customUrlInput.addEventListener('input', updatePreview);
  pillTextInput.addEventListener('input', updatePreview);

  shopNamePreview.addEventListener('input', () => {
    shopNameInput.value = shopNamePreview.textContent;
    updatePreview();
  });
  shopNamePreview.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); shopNamePreview.blur(); }
  });

  themeSwatches.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    setTheme(btn.dataset.color);
  });

  copyBtn.addEventListener('click', async () => {
    const url = getShopUrl();
    try {
      await navigator.clipboard.writeText(url);
      showToast('লিংক কপি হয়েছে!');
    } catch {
      showToast(url);
    }
  });

  downloadBtn.addEventListener('click', downloadPNG);

  // Tilt effect
  if (window.matchMedia('(hover: hover)').matches) {
    tiltWrap.addEventListener('mousemove', (e) => {
      const r = tiltWrap.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      sticker.style.transform = 'rotateY(' + (x * 6) + 'deg) rotateX(' + (-y * 6) + 'deg) translateZ(0)';
    });
    tiltWrap.addEventListener('mouseleave', () => {
      sticker.style.transform = 'rotateY(0) rotateX(0)';
    });
  }

  // --- START INITIALIZATION ---
  // Check if we are running via Firebase Puppeteer (Server Mode)
  const metaServerMode = document.querySelector('meta[name="server-mode"]');
  const isServer = metaServerMode && metaServerMode.content === 'true';

  if (isServer) {
    // We are in Firebase! Use the injected values directly and skip URL generation.
    const sShop = document.querySelector('meta[name="server-shop"]').content;
    const sQr = document.querySelector('meta[name="server-qr"]').content;
    const sTheme = document.querySelector('meta[name="server-theme"]').content;

    shopNamePreview.textContent = sShop || 'আমার দোকান';
    if (sQr) qrImg.src = sQr;
    
    if (sTheme) {
      currentTheme = sTheme;
      document.documentElement.style.setProperty('--theme', sTheme);
      
      const rgb = hexToRgb(sTheme);
      const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
      const textColor = brightness > 160 ? '#000000' : '#FFFFFF';
      const iconColor = brightness > 160 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.9)';
      
      document.documentElement.style.setProperty('--pill-text-color', textColor);
      const pillIcon = document.querySelector('.pill svg');
      if (pillIcon) pillIcon.style.color = iconColor;
      document.querySelector('.bg-decor > div:nth-child(2)').style.backgroundColor = sTheme + '33';
    }
  } else {
    // We are on the regular website. Init from URL params normally.
    const params = new URLSearchParams(location.search);
    const paramShop = params.get('shop');
    const paramUrl = params.get('url');
    const paramColor = params.get('color');
    
    if (paramShop) {
      shopNameInput.value = decodeURIComponent(paramShop);
      shopSlugInput.value = slugify(paramShop);
    }
    if (paramUrl) customUrlInput.value = paramUrl;
    if (paramColor && /^#?[0-9a-f]{3,6}$/i.test(paramColor)) {
      setTheme(paramColor.startsWith('#') ? paramColor : '#' + paramColor);
    } else {
      setTheme(currentTheme);
    }

    updatePreview();
  }
</script>
</body>
</html>
